<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital School</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-pink-800 flex items-center justify-center min-h-screen">

  <div class="bg-black w-full max-w-2xl p-8 rounded-2xl shadow-2xl">

    <div class="mb-6">
      <img class="h-20 mx-auto" src="https://digitalcollege.com.br/wp-content/uploads/2022/05/logo-digital.png" alt="logo digital college">
    </div>
      <h1 class="text-pink-600 mb-4 text-2xl font-bold">Cadastro</h1>
    <form class="space-y-5">
      <div>
        <label class="block text-white mb-2">Nome</label>
        <input id="nome" type="nome" placeholder="Digite seu nome" class="w-full px-4 py-2 rounded-lg bg-white text-black focus:outline-none focus:ring-2 focus:ring-pink-800" required />
      </div>
      <div>
        <label class="block text-white mb-2">Email</label>
        <input id="email" type="email" placeholder="Digite seu email" class="w-full px-4 py-2 rounded-lg bg-white text-black focus:outline-none focus:ring-2 focus:ring-pink-800" required />
      </div>
      <div>
        <label class="block text-white mb-2">CEP</label>
        <input id="cep" type="text" placeholder="Digite o CEP" class="w-1/3 px-4 py-2 rounded-lg bg-white text-black focus:outline-none focus:ring-2 focus:ring-pink-800" required />
      </div>
      <div class="flex justify-between gap-3">
      <div class="flex-1">
        <label class="block text-white mb-2">Rua</label>
        <input id="logradouro" type="text" class="w-full px-4 py-2 rounded-lg bg-white text-black focus:outline-none focus:ring-2 focus:ring-pink-800" required readonly />
      </div>
        <div>
          <label class="block text-white mb-2">Número</label>
          <input id="numero" type="number" placeholder="Digite o número" class=" px-4 py-2 rounded-lg bg-white text-black focus:outline-none focus:ring-2 focus:ring-pink-800" required />
        </div> 
       </div>
        <div>
          <label class="block text-white mb-2">Bairro</label>
          <input id="bairro" type="text" class="w-full px-4 py-2 rounded-lg bg-white text-black focus:outline-none focus:ring-2 focus:ring-pink-800" required readonly/>
        </div>
    
      <div class="flex gap-3">
      <div>
        <label class="block text-white mb-2">Cidade</label>
        <input id="localidade" type="text" class="w-full px-4 py-2 rounded-lg bg-white text-black focus:outline-none focus:ring-2 focus:ring-pink-800" required readonly />
      </div>
      <div>
        <label class="block text-white mb-2">Estado</label>
        <input id="uf" type="text" class="w-full px-4 py-2 rounded-lg bg-white text-black focus:outline-none focus:ring-2 focus:ring-pink-800" required readonly/>
      </div>
    </div>
      <button onclick="login()" type="button" class="w-full bg-pink-800 text-white py-2 rounded-lg font-semibold hover:bg-pink-700 transition duration-300">
        Entrar
      </button>

    </form>

    <p class="text-center text-gray-400 text-sm mt-6">
      © 2026 - Todos os direitos reservados
    </p>

  </div>

  <script src="../script/cadastro.js"></script>
</body>

</html>
